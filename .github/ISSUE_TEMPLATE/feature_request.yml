name: Feature Request
description: Suggest a new feature for Velin
title: "[Feature]: "
labels: ["enhancement"]

body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this feature solve?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe the feature you'd like

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
